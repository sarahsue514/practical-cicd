name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  hello:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Say hello
        run: echo "GitHub Actions is working!"

      - name: Show Git commit
        run: |
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref }}"
